# Typos configuration tuned for this skill repository.

[files]
extend-exclude = [
  # Runtime/generated or sensitive local state.
  "auth.json",
  "history.jsonl",
  "sessions/**",
  "log/**",
]

[default.extend-identifiers]
# Common technical identifiers used in scripts/docs.
BASH_SOURCE = "BASH_SOURCE"
jsonl = "jsonl"
tomllib = "tomllib"

[default.extend-words]
# Project/domain terms to avoid noisy false positives.
cli = "cli"
codex = "codex"
jsonl = "jsonl"
llm = "llm"
stdout = "stdout"
stderr = "stderr"
toml = "toml"
